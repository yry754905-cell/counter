<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 你的 Firebase 設定（已幫你放好）
const firebaseConfig = {
  apiKey: "AIzaSyDLSMYAhB6xMspKK23WYULfehwwYIevvjE",
  authDomain: "visitor-counter-6f0d6.firebaseapp.com",
  projectId: "visitor-counter-6f0d6",
  storageBucket: "visitor-counter-6f0d6.firebasestorage.app",
  messagingSenderId: "157408478458",
  appId: "1:157408478458:web:e2319f40c67906d6713543",
  measurementId: "G-GCKZYT0RZ8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 產生唯一ID（每個人）
const userId = localStorage.getItem("visitorId") || Math.random().toString(36).substr(2);
localStorage.setItem("visitorId", userId);

// 🔥 更新在線時間
async function updateOnline() {
  await setDoc(doc(db, "online", userId), {
    time: Date.now()
  });
}

// 🔥 每5秒更新一次（心跳）
setInterval(updateOnline, 5000);
updateOnline();

// 🔥 計算在線人數（60秒內）
async function getOnlineCount() {
  const now = Date.now();
  const oneMinuteAgo = now - 60 * 1000;

  const q = query(
    collection(db, "online"),
    where("time", ">", oneMinuteAgo)
  );

  const snapshot = await getDocs(q);
  document.getElementById("online").innerText = snapshot.size;
}

// 🔥 每3秒刷新在線人數
setInterval(getOnlineCount, 3000);
getOnlineCount();
</script>

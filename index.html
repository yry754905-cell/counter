<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Counter</title>
</head>

<body>
<h1>計數器</h1>

<p>總訪問：<span id="total"></span></p>
<p>今日訪問：<span id="today"></span></p>

<script>
let total = localStorage.getItem("total") || 1000;
let todayKey = new Date().toISOString().slice(0,10);
let today = localStorage.getItem(todayKey) || 0;

total++;
today++;

localStorage.setItem("total", total);
localStorage.setItem(todayKey, today);

document.getElementById("total").innerText = total;
document.getElementById("today").innerText = today;
</script>

</body>
</html>
